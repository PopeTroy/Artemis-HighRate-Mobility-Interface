name: Artemis Sovereign Hive Loop
on: [push, workflow_dispatch]

jobs:
  deploy-apex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          mkdir -p logs/snapshots 

      - name: Deploy Sovereign Entity
        env:
          GROQ_SECRET: ${{ secrets.GROQ_SECRET }}
          NVIDIA_SECRET: ${{ secrets.NVIDIA_SECRET }}
          PYTHONPATH: ${{ github.workspace }}
        run: python main.py
