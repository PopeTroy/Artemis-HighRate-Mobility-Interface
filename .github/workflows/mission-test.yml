name: Mars Sovereign Mission
on:
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  run-rover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install groq numpy

      - name: Execute Mission
        env:
          GROQ_SECRET: ${{ secrets.GROQ_SECRET }} # Set this in GitHub Secrets
        run: python main.py
